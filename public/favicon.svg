<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#1a1a2e"/>
  <!-- Token block 1 - pink/salmon -->
  <rect x="2" y="8" width="8" height="16" rx="2" fill="#ff8fab" opacity="0.9"/>
  <!-- Token block 2 - green -->
  <rect x="12" y="8" width="8" height="16" rx="2" fill="#90e0a0" opacity="0.9"/>
  <!-- Token block 3 - sky blue -->
  <rect x="22" y="8" width="8" height="16" rx="2" fill="#87ceeb" opacity="0.9"/>
  <!-- Separator lines -->
  <line x1="10" y1="11" x2="10" y2="21" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="20" y1="11" x2="20" y2="21" stroke="#1a1a2e" stroke-width="1.5"/>
</svg>
